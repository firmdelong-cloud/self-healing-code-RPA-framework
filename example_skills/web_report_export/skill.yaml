skill_id: web_report_export
id: web_report_export
name: Web Report Export
version: 0.2.0
type: procedure_skill
runtime: web
description: Log in to a local report page, select a date range, export a report, and verify success.
entrypoint: main.py
selectors: selectors.yaml
repair_policy: repair_policy.yaml
inputs:
  username:
    type: string
    default: demo_user
  password:
    type: string
    default: demo_password
variables:
  report_demo_url: "{{REPORT_DEMO_URL}}"
outputs: {}
policies:
  high_risk_requires_human: true
tests:
  - tests/test_runtime.py
nodes:
  - id: open_login_page
    component: browser.goto
    goal: Open the local report system login page.
    inputs:
      url: "{{REPORT_DEMO_URL}}"

  - id: fill_username
    component: browser.fill
    goal: Fill the demo username.
    inputs:
      selector_ref: username_input
      value: demo_user

  - id: fill_password
    component: browser.fill
    goal: Fill the demo password.
    inputs:
      selector_ref: password_input
      value: demo_password

  - id: submit_login
    component: browser.click
    goal: Submit the login form.
    inputs:
      selector_ref: login_submit_button

  - id: enter_report_page
    component: browser.click
    goal: Enter the report page from the dashboard.
    inputs:
      selector_ref: report_page_link

  - id: fill_start_date
    component: browser.fill
    goal: Fill the report start date.
    inputs:
      selector_ref: date_start_input
      value: "2026-06-01"

  - id: fill_end_date
    component: browser.fill
    goal: Fill the report end date.
    inputs:
      selector_ref: date_end_input
      value: "2026-06-17"

  - id: click_export
    component: browser.click
    goal: Click the export button to generate the report.
    target_description: Button that starts report generation.
    inputs:
      selector_ref: export_button

  - id: verify_export_success
    component: browser.wait_for_selector
    goal: Confirm that the export finished successfully.
    inputs:
      selector_ref: export_success_message
edges:
  - from: open_login_page
    to: fill_username
  - from: fill_username
    to: fill_password
  - from: fill_password
    to: submit_login
  - from: submit_login
    to: enter_report_page
  - from: enter_report_page
    to: fill_start_date
  - from: fill_start_date
    to: fill_end_date
  - from: fill_end_date
    to: click_export
  - from: click_export
    to: verify_export_success
