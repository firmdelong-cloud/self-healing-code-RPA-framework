retry:
  max_attempts: 1
  delay_seconds: 0
repair_scope:
  scope_type: selector_only
  allowed_files:
    - example_skills/report_export_and_summary/selectors.yaml
  allowed_selector_refs: []
  must_not_touch_other_steps: true
  must_not_touch_runtime: true
allowed_patch_scope:
  - failed_component_node
  - selectors
sandbox:
  required: true
  command:
    - python
    - -m
    - pytest
